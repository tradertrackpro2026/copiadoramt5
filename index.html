<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;


/* ================================================================
   § 0  LICENCIA — COPYTRADE MT5 PRO
   ─────────────────────────────────────────────────────────────────
   Valida la licencia del usuario contra el Cloudflare Worker antes
   de mostrar el dashboard. La licencia se guarda en localStorage
   para no pedirla en cada visita.
   NO modificar esta sección.
   ================================================================ */
const LICENSE_WORKER = "https://copytrade-license-worker.anibalchingal90.workers.dev";
const LICENSE_STORAGE_KEY = "ct_license";

// Genera un device ID persistente para este navegador
const getDeviceId = () => {
  let id = localStorage.getItem("ct_device_id");
  if (!id) {
    id = "WEB_" + Math.random().toString(36).slice(2,10).toUpperCase()
             + "_" + Date.now().toString(36).toUpperCase();
    localStorage.setItem("ct_device_id", id);
  }
  return id;
};

// Llama al Worker y devuelve { valid, plan, maxMasters, maxFollowers, error }
const validateLicense = async (licenseKey) => {
  try {
    const res = await fetch(`${LICENSE_WORKER}/validate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ license: licenseKey, device_id: getDeviceId() }),
    });
    const data = await res.json();
    if (data.valid) {
      return {
        valid:        true,
        plan:         data.plan         || "basic",
        maxMasters:   data.maxMasters   || 1,
        maxFollowers: data.maxFollowers || 3,
        reseller:     data.reseller     || "",
      };
    }
    // Mapear errores a mensajes legibles
    const msgs = {
      LICENSE_NOT_FOUND:    "Licencia no encontrada. Verifica el código.",
      LICENSE_REVOKED:      "Esta licencia ha sido revocada. Contacta al administrador.",
      MAX_DEVICES_REACHED:  "Límite de dispositivos alcanzado. Contacta al administrador.",
      MISSING_PARAMS:       "Error en la solicitud. Intenta de nuevo.",
      SERVER_ERROR:         "Error del servidor. Intenta más tarde.",
    };
    return { valid: false, error: msgs[data.error] || "Licencia inválida." };
  } catch {
    return { valid: false, error: "Sin conexión con el servidor de licencias. Verifica tu internet." };
  }
};

    <polygon points="28,34 38,40 31,47" fill={color} opacity="0.7"/>
  </svg>
);

const Mt5IconMaster   = () => <Mt5Logo size={22} color="#f5a623"/>;
const Mt5IconFollower = () => <Mt5Logo size={18} color="#818cf8"/>;

    const result = await validateLicense(clean);
    setLoading(false);

          fontSize:20, fontWeight:900,

          textAlign:"center", color:T.textMuted, fontSize:13,

            style={{
              width:"100%", background:T.cardLight, border:`1px solid ${error ? T.err : T.border}`,
              borderRadius:10, padding:"12px 16px", color:T.text, fontSize:15,
              outline:"none", boxSizing:"border-box", fontFamily:"monospace",
              textAlign:"center", letterSpacing:"2px", textTransform:"uppercase",
              transition:"border 0.15s",
            }}
          />
        </div>

        {/* Error */}
        {error && (
          <div style={{
            background:T.errLow, border:`1px solid ${T.err}40`,
            borderRadius:8, padding:"10px 14px", marginBottom:14,
            color:T.err, fontSize:12, textAlign:"center", lineHeight:1.6,
          }}>
            {error}
          </div>
        )}

        {/* Botón */}
        <button
          onClick={() => { playClick(); handleSubmit(); }}
          disabled={loading}
          style={{
            width:"100%", padding:"13px", borderRadius:10, border:"none",
            background: loading ? T.cardLight : T.accent,
            color: loading ? T.textMuted : "#fff",
            fontWeight:800, fontSize:15, cursor: loading ? "not-allowed" : "pointer",
            letterSpacing:"0.3px", transition:"all 0.2s",
            boxShadow: loading ? "none" : `0 0 20px ${T.accentGlow}`,
          }}
        >
          {loading ? "⟳ Validando..." : "Activar dashboard →"}
        </button>

        {/* Planes info */}
        <div style={{marginTop:28, borderTop:`1px solid ${T.border}`, paddingTop:20}}>
          <div style={{color:T.textMuted, fontSize:11, textAlign:"center", marginBottom:12, fontWeight:700, letterSpacing:"0.5px", textTransform:"uppercase"}}>
            Planes disponibles
          </div>
          {Object.entries(planLabels).map(([k, v]) => (
            <div key={k} style={{
              display:"flex", justifyContent:"space-between", alignItems:"center",
              padding:"7px 0", borderBottom:`1px solid ${T.border}`,
            }}>
              <span style={{color:T.textSec, fontSize:13, fontWeight:700}}>{v.label}</span>
              <span style={{color:T.textMuted, fontSize:12}}>{v.desc}</span>
            </div>
          ))}
        </div>

        <div style={{marginTop:18, textAlign:"center", color:T.textMuted, fontSize:11, lineHeight:1.7}}>
          Pago único · Sin suscripción mensual<br/>
          ¿Problemas? Contacta al administrador.
        </div>
      </div>
    </div>

/* ================================================================
   § 4  CONEXIÓN A SUPABASE
   ─────────────────────────────────────────────────────────────────
   Cliente ligero para Supabase REST API.
   Cada usuario conecta su propia cuenta gratuita.
   No modifiques esto a menos que cambies el backend.
   ================================================================ */
const makeSupaClient = (url, key) => {
  if (!url || !key) return null;
  const h = {
    "apikey": key,
    "Authorization": `Bearer ${key}`,
    "Content-Type": "application/json",
  };
  const base = `${url}/rest/v1`;
  return {
    url, key,
    get:    async (t,q="")  => { try { const r=await fetch(`${base}/${t}?${q}`,{headers:h}); return r.ok?r.json():null; } catch{return null;} },
    post:   async (t,b)     => { try { const r=await fetch(`${base}/${t}`,{method:"POST",headers:{...h,"Prefer":"return=representation"},body:JSON.stringify(b)}); return r.ok?r.json():null; } catch{return null;} },
    patch:  async (t,q,b)   => { try { const r=await fetch(`${base}/${t}?${q}`,{method:"PATCH",headers:{...h,"Prefer":"return=representation"},body:JSON.stringify(b)}); return r.ok?r.json():null; } catch{return null;} },
    delete: async (t,q)     => { try { const r=await fetch(`${base}/${t}?${q}`,{method:"DELETE",headers:h}); return r.ok; } catch{return false;} },
  };
};

/* — Botón — */
const Btn = ({ children, onClick, variant="primary", size="md", disabled=false, sx={} }) => {
  const [pressed, setPressed] = React.useState(false);
  const base = {
    cursor:disabled?"not-allowed":"pointer", opacity:disabled?0.45:1,
    border:"none", borderRadius:8, fontWeight:700,
    display:"inline-flex", alignItems:"center", gap:5,
    fontFamily:"inherit",
    fontSize: size==="sm"?11:size==="lg"?15:13,
    padding:  size==="sm"?"5px 11px":size==="lg"?"11px 22px":"7px 15px",
    letterSpacing:"0.2px",
    transform: pressed ? "scale(0.91)" : "scale(1)",
    transition:"transform 0.07s ease, box-shadow 0.12s ease, opacity 0.15s",
    userSelect:"none",
  };
  const variants = {
    primary: { background:T.accent,     color:"#fff",    boxShadow: pressed ? "none" : `0 0 14px ${T.accentGlow}` },
    danger:  { background:T.errLow,     color:T.err,     border:`1px solid ${T.err}35` },
    success: { background:T.okLow,      color:T.ok,      border:`1px solid ${T.ok}35`  },
    ghost:   { background:"transparent",color:T.textSec, border:`1px solid ${T.border}` },

    warn:    { background:T.warnLow,    color:T.warn,    border:`1px solid ${T.warn}35` },
  };
  return (
    <button
      style={{...base,...variants[variant],...sx}}
      onClick={disabled ? undefined : () => { playClick(); onClick && onClick(); }}
      onMouseDown={() => !disabled && setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)}
    >
      {children}
    </button>
  );
};

const OpenPositions = ({ master, supaConfig }) => {
  const [positions, setPositions] = React.useState([]);
  const [loading,   setLoading]   = React.useState(false);

  React.useEffect(() => {
    if (!supaConfig?.url || !master?.id) return;
    let cancelled = false;

    const load = async () => {
      setLoading(true);
      try {
        const h = { "apikey": supaConfig.key, "Authorization": `Bearer ${supaConfig.key}` };

        // Traer todas las señales OPEN de esta maestra
        const rOpen = await fetch(
          `${supaConfig.url}/rest/v1/senales?maestra_id=eq.${master.id}&tipo=eq.OPEN&select=id,ticket_master,simbolo,direccion,lotes,creado_en&order=creado_en.desc&limit=100`,
          { headers: h }
        );
        const opens = rOpen.ok ? await rOpen.json() : [];
        if (!opens.length) { if (!cancelled) { setPositions([]); setLoading(false); } return; }

        // Traer señales CLOSE de esta maestra
        const rClose = await fetch(
          `${supaConfig.url}/rest/v1/senales?maestra_id=eq.${master.id}&tipo=eq.CLOSE&select=ticket_master`,
          { headers: h }
        );
        const closes = rClose.ok ? await rClose.json() : [];
        const closedTickets = new Set(closes.map(c => c.ticket_master));

        // Filtrar: solo OPEN sin CLOSE del mismo ticket
        const abiertas = opens.filter(o => !closedTickets.has(o.ticket_master));
        if (!abiertas.length) { if (!cancelled) { setPositions([]); setLoading(false); } return; }

        // Traer ejecuciones para cada señal abierta
        const ids = abiertas.map(o => o.id).join(",");
        const rEjec = await fetch(
          `${supaConfig.url}/rest/v1/ejecuciones?senal_id=in.(${ids})&select=senal_id,receptora_id,lotes_copiados,estado`,
          { headers: h }
        );
        const ejecs = rEjec.ok ? await rEjec.json() : [];

        // Cruzar con nombres de receptoras
        const followerNames = {};
        master.followers.forEach(f => { followerNames[f.id] = f.name; });

        const result = abiertas.map(o => ({
          id:        o.id,
          ticket:    o.ticket_master,
          simbolo:   o.simbolo,
          direccion: o.direccion,
          lotes:     o.lotes,
          hora:      o.creado_en ? new Date(o.creado_en).toLocaleTimeString("es",{hour12:false,hour:"2-digit",minute:"2-digit"}) : "—",
          copias:    ejecs
            .filter(e => e.senal_id === o.id)
            .map(e => ({
              nombre: followerNames[e.receptora_id] || e.receptora_id,
              lotes:  e.lotes_copiados,
              ok:     e.estado === "ok",
            })),
        }));

        if (!cancelled) { setPositions(result); setLoading(false); }
      } catch(e) {
        if (!cancelled) setLoading(false);
      }
    };

    load();
    const interval = setInterval(load, 10000); // refresca cada 10s
    return () => { cancelled = true; clearInterval(interval); };
  }, [master?.id, supaConfig]);

  if (!supaConfig?.url) return null;

  return (
    <div style={{ marginTop:16 }}>
      {/* Título */}
      <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:10}}>
        <span style={{fontSize:11, fontWeight:700, color:T.textMuted,
          textTransform:"uppercase", letterSpacing:"0.8px"}}>
          Posiciones abiertas
        </span>
        {loading && <span style={{fontSize:10, color:T.textMuted}}>↻ actualizando...</span>}
        {!loading && (
          <span style={{
            fontSize:11, fontWeight:800, fontFamily:"monospace",
            color: positions.length > 0 ? T.warn : T.textMuted,
            background: positions.length > 0 ? T.warnLow : T.cardLight,
            border:`1px solid ${positions.length > 0 ? T.warn+"40" : T.border}`,
            borderRadius:5, padding:"1px 7px",
          }}>
            {positions.length}
          </span>
        )}
      </div>

      {positions.length === 0 && !loading && (
        <div style={{
          color:T.textMuted, fontSize:12, fontStyle:"italic",
          padding:"10px 14px", background:T.cardLight,
          border:`1px solid ${T.border}`, borderRadius:8,
        }}>
          Sin posiciones abiertas detectadas
        </div>
      )}

      {positions.length > 0 && (
        <div style={{
          border:`1px solid ${T.border}`, borderRadius:10, overflow:"hidden",
        }}>
          {/* Header */}
          <div style={{
            display:"grid", gridTemplateColumns:"70px 55px 60px 1fr 55px",
            padding:"7px 14px", background:T.cardLight,
            borderBottom:`1px solid ${T.border}`,
          }}>
            {["Símbolo","Dir","Lotes","Receptoras que copiaron","Hora"].map(h => (
              <span key={h} style={{fontSize:10, fontWeight:700, color:T.textMuted,
                textTransform:"uppercase", letterSpacing:"0.5px"}}>{h}</span>
            ))}
          </div>

          {/* Filas */}
          {positions.map((pos, i) => (
            <div key={pos.id} style={{
              display:"grid", gridTemplateColumns:"70px 55px 60px 1fr 55px",
              padding:"9px 14px", alignItems:"center",
              borderBottom: i < positions.length-1 ? `1px solid ${T.border}` : "none",
              background: i % 2 === 0 ? "transparent" : `${T.cardLight}50`,
            }}>
              <span style={{color:T.text, fontWeight:700, fontSize:13, fontFamily:"monospace"}}>
                {pos.simbolo}
              </span>
              <span style={{
                fontSize:11, fontWeight:800, padding:"2px 7px", borderRadius:5,
                background: pos.direccion==="BUY" ? `${T.ok}20` : `${T.err}20`,
                color:       pos.direccion==="BUY" ? T.ok         : T.err,
                textAlign:"center", width:"fit-content",
              }}>
                {pos.direccion}
              </span>
              <span style={{color:T.warn, fontWeight:700, fontSize:13, fontFamily:"monospace"}}>
                {parseFloat(pos.lotes).toFixed(2)}
              </span>
              <div style={{display:"flex", gap:5, flexWrap:"wrap"}}>
                {pos.copias.length === 0 && (
                  <span style={{color:T.textMuted, fontSize:11, fontStyle:"italic"}}>Sin copias</span>
                )}
                {pos.copias.map((c, j) => (
                  <span key={j} style={{
                    fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:5,
                    background: c.ok ? T.okLow : T.errLow,
                    color: c.ok ? T.ok : T.err,
                    border:`1px solid ${c.ok ? T.ok+"30" : T.err+"30"}`,
                  }}>
                    {c.nombre} · {parseFloat(c.lotes||0).toFixed(2)}
                  </span>
                ))}
              </div>
              <span style={{color:T.textMuted, fontSize:11}}>{pos.hora}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ================================================================
   § 14  COMPONENTE — FILA DE CUENTA RECEPTORA
   ─────────────────────────────────────────────────────────────────
   Una fila por cada cuenta follower con sus controles.
   Modifica solo esta sección para cambiar la tabla de followers.
   ================================================================ */
const playClick = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(900, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.06);
  } catch(e) {}
};

/* Botón de acción con texto + icono + efecto hover/press */
const ActionBtn = ({ icon, text, label, onClick, variant="default" }) => {
  const [pressed, setPressed] = React.useState(false);
  const [hovered, setHovered] = React.useState(false);
  const colors = {
    default: { bg: T.cardLight,  border: T.border,      color: T.textSec, glow: "none"                    },
    log:     { bg: T.purpleLow,  border: T.purple+"50", color: T.purple,  glow: `0 0 8px ${T.purple}40`   },
    danger:  { bg: T.errLow,     border: T.err+"50",    color: T.err,     glow: `0 0 8px ${T.err}40`      },
  };
  const c = colors[variant] || colors.default;
  const active = hovered || pressed;
  return (
    <button
      title={label}
      onClick={() => { playClick(); onClick(); }}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => { setHovered(false); setPressed(false); }}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      style={{
        height:26, borderRadius:7, padding: text ? "0 9px" : "0",
        width: text ? "auto" : 26,
        border:`1px solid ${active ? c.border : T.border}`,
        background: active ? c.bg : T.cardLight,
        color: active ? c.color : T.textMuted,
        cursor:"pointer", fontSize:12,
        display:"flex", alignItems:"center", justifyContent:"center", gap:4,
        flexShrink:0, transition:"all 0.12s", whiteSpace:"nowrap",
        transform: pressed ? "scale(0.93)" : hovered ? "scale(1.04)" : "scale(1)",
        boxShadow: active ? c.glow : "none",
        fontWeight: 700, fontFamily:"inherit",
      }}>
      <span style={{fontSize:13}}>{icon}</span>
      {text && <span style={{fontSize:10, letterSpacing:"0.3px"}}>{text}</span>}
    </button>
  );
};

            </span>
          </div>
          <Toggle
            on={follower.enabled}
            onChange={()=>{ playClick(); onToggle(follower.id); }}
            size="sm"
          />
        </div>

        {/* Fila 2: botones de acción + ping */}
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          {/* Botones visibles directamente */}
          <div style={{display:"flex", gap:4}}>
            <ActionBtn icon="📋" text="Ops"      label="Ver operaciones"  variant="log"    onClick={()=>onLog(follower)}/>

            <div style={{color:T.textMuted, fontSize:10}}>

            <div style={{color:T.textMuted, fontSize:11, marginTop:2}}>{follower.lastOp}</div>
          </div>
        </div>

      </div>
    </div>
  );
};

/* ================================================================
   § 19  COMPONENTE — BARRA DE PLAN DE LICENCIA
   ─────────────────────────────────────────────────────────────────
   Muestra el plan activo, límites de maestras y followers,
   y el uso actual. Solo lectura — no modifica lógica de negocio.
   ================================================================ */
const PlanBar = ({ licenseInfo, masters, onLogout }) => {
  const plan   = licenseInfo?.plan || "basic";
  const maxM   = licenseInfo?.maxMasters   || 1;
  const maxF   = licenseInfo?.maxFollowers || 3;
  const usedM  = masters.length;
  const usedF  = masters.reduce((acc, m) => acc + m.followers.length, 0);

  const pctM = maxM >= 999 ? 0 : Math.round((usedM / maxM) * 100);
  const pctF = maxF >= 999 ? 0 : Math.round((usedF / maxF) * 100);

  const planColors = { basic: T.textSec, pro: T.accent, vip: T.warn };
  const planLabels = { basic: "🔵 Basic", pro: "🔷 Pro", vip: "👑 VIP" };
  const planColor  = planColors[plan] || T.textSec;
  const planLabel  = planLabels[plan] || plan.toUpperCase();

  const MiniBar = ({ used, max, color }) => (
    <div style={{width:80, height:4, background:T.border, borderRadius:2, overflow:"hidden"}}>
      <div style={{
        height:"100%", borderRadius:2, transition:"width 0.4s",
        width: max >= 999 ? "100%" : `${Math.min(pctM,100)}%`,
        background: max >= 999 ? T.ok : used >= max ? T.err : color,
      }}/>
    </div>
  );

  return (
    <div style={{
      display:"flex", alignItems:"center", justifyContent:"space-between",
      flexWrap:"wrap", gap:12,
      background:T.card, border:`1px solid ${T.border}`,
      borderRadius:12, padding:"12px 20px", marginBottom:18,
    }}>
      {/* Plan badge */}
      <div style={{display:"flex", alignItems:"center", gap:10}}>
        <div style={{
          background:`${planColor}18`, border:`1px solid ${planColor}40`,
          borderRadius:8, padding:"4px 12px",
          color:planColor, fontWeight:800, fontSize:13, letterSpacing:"0.3px",
        }}>
          {planLabel}
        </div>
        {licenseInfo?.key && (
          <span style={{color:T.textMuted, fontSize:11, fontFamily:"monospace"}}>
            {licenseInfo.key}
          </span>
        )}
      </div>

      {/* Uso maestras y followers */}
      <div style={{display:"flex", gap:24, alignItems:"center", flexWrap:"wrap"}}>
        {/* Maestras */}
        <div style={{display:"flex", flexDirection:"column", gap:4}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:12}}>
            <span style={{color:T.textMuted, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.4px"}}>
              Maestras
            </span>
            <span style={{
              color: usedM >= maxM && maxM < 999 ? T.err : T.text,
              fontSize:12, fontWeight:800, fontFamily:"monospace",
            }}>
              {usedM} / {maxM >= 999 ? "∞" : maxM}
            </span>
          </div>
          <MiniBar used={usedM} max={maxM} color={T.accent}/>
        </div>

        {/* Followers */}
        <div style={{display:"flex", flexDirection:"column", gap:4}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:12}}>
            <span style={{color:T.textMuted, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.4px"}}>
              Followers
            </span>
            <span style={{
              color: usedF >= maxF && maxF < 999 ? T.err : T.text,
              fontSize:12, fontWeight:800, fontFamily:"monospace",
            }}>
              {usedF} / {maxF >= 999 ? "∞" : maxF}
            </span>
          </div>
          <MiniBar used={usedF} max={maxF} color={T.ok}/>
        </div>

        {/* Botón cerrar sesión */}
        <button onClick={onLogout} style={{
          background:"transparent", border:`1px solid ${T.border}`,
          borderRadius:7, padding:"5px 12px", color:T.textMuted,
          fontSize:11, fontWeight:700, cursor:"pointer", letterSpacing:"0.3px",
          transition:"all 0.15s",
        }}
        onMouseEnter={e=>{e.currentTarget.style.borderColor=T.err;e.currentTarget.style.color=T.err;}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.textMuted;}}>
          🔒 Cerrar sesión
        </button>
      </div>
    </div>
  );
};

/* ================================================================
   § 16  COMPONENTE — ALERTAS FLOTANTES
   ─────────────────────────────────────────────────────────────────
   Aparece flotando arriba a la derecha. No empuja el contenido.
   Cada alerta se puede cerrar individualmente.
   ================================================================ */
const AlertsPanel = ({ masters }) => {
  const allAlerts = [];
  masters.forEach(m=>{
    m.followers.filter(f=>f.failedCopies>0).forEach(f=>{
      allAlerts.push({ id:`fail-${m.id}-${f.id}`, type:"failed", masterName:m.name, followerName:f.name, count:f.failedCopies });
    });
    m.followers.filter(f=>f.status!=="connected"&&f.status!=="online"&&f.enabled).forEach(f=>{
      allAlerts.push({ id:`off-${m.id}-${f.id}`, type:"offline", masterName:m.name, followerName:f.name });
    });
    if (m.status!=="online"&&m.copierOn) {
      allAlerts.push({ id:`moff-${m.id}`, type:"master_offline", masterName:m.name });
    }
  });
  const [dismissed, setDismissed] = useState([]);
  const visible = allAlerts.filter(a=>!dismissed.includes(a.id));
  if (visible.length===0) return null;
  return (
    <div style={{
      position:"fixed", top:72, right:20, zIndex:500,
      display:"flex", flexDirection:"column", gap:8, maxWidth:360,
    }}>
      {visible.map(a=>(
        <div key={a.id} style={{
          background:"#1a0810", border:`1px solid ${T.err}50`,
          borderRadius:10, padding:"10px 14px",
          display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:10,
          boxShadow:"0 4px 20px rgba(0,0,0,0.5)",
          animation:"fadeIn 0.2s ease",
        }}>
          <div style={{fontSize:12, color:T.err, lineHeight:1.5}}>
            <span style={{fontWeight:800}}>⚠ </span>
            {a.type==="failed"         && <span><b>{a.followerName}</b> — {a.count} copia(s) fallida(s)</span>}
            {a.type==="offline"        && <span><b>{a.followerName}</b> desconectada</span>}
            {a.type==="master_offline" && <span>Maestra <b>{a.masterName}</b> offline</span>}
          </div>
          <button onClick={()=>{ playClick(); setDismissed(p=>[...p,a.id]); }} style={{
            background:"transparent", border:"none", color:T.err,
            cursor:"pointer", fontSize:14, lineHeight:1, padding:"0 2px", flexShrink:0,
          }}>✕</button>
        </div>
      ))}
    </div>
  );
};

        onMouseEnter={e=>{e.currentTarget.style.borderColor=T.err;e.currentTarget.style.color=T.err;}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.textMuted;}}
        onMouseDown={e=>e.currentTarget.style.transform="scale(0.91)"}
        onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}>
          🔒 Salir
        </button>
      </div>
    </div>
  );
};

/* ================================================================
   § 18  APP PRINCIPAL
   ─────────────────────────────────────────────────────────────────
   Estado global, handlers y composición de todos los componentes.
   Modifica aquí solo la lógica de alto nivel y el ensamblado.
   ================================================================ */
function CopyTradeApp() {
  // ══ TODOS LOS HOOKS PRIMERO — Regla de React: nunca hooks después de un return ══

  // ── § 0  Estado de licencia ──
  const licGuardada = (() => {
    try { return JSON.parse(localStorage.getItem(LICENSE_STORAGE_KEY) || "null"); } catch { return null; }
  })();
  const [licenseInfo, setLicenseInfo] = useState(licGuardada);

  // ── Cargar config guardada del navegador ──
  const configGuardada = (() => {
    try { return JSON.parse(localStorage.getItem("ct_supa") || "{}"); } catch { return {}; }
  })();

  // ── Estado global — arranca vacío, sin datos demo ──
  const [masters, setMasters]       = useState([]);
  const [activeMId, setActiveMId]   = useState(null);
  // Ref que protege toggles recientes del poll de Supabase (5s)
  const protectedToggles = useRef(new Map()); // key: "m:{mid}" | "f:{fid}", val: {val, exp}
  const [logs, setLogs]             = useState([]);
  const [supaConfig, setSupaConfig] = useState(configGuardada);
  const [demoMode, setDemoMode]     = useState(!configGuardada?.url);

  // ── Estado de modales ──
  const [modal, setModal]               = useState(null);
  const [editingFollower, setEditing]   = useState(null);
  const [logFollowerFilter, setLogFilt] = useState(null);
  const [addFollowerFor, setAddFor]     = useState(null);
  const [drawerOpen, setDrawerOpen]     = useState(false);

  const close  = () => { setModal(null); setEditing(null); setLogFilt(null); setAddFor(null); };
  const activeMaster = masters.find(m=>m.id===activeMId) || masters[0];

  // ── Simulación de ping en tiempo real ──
  useEffect(()=>{
    const iv = setInterval(()=>{
      setMasters(p=>p.map(m=>({
        ...m,
        followers:m.followers.map(f=>({
          ...f,
          ping:Math.max(8, f.ping + Math.round((Math.random()-0.5)*10)),
        })),
      })));
    }, CFG.PING_MS);
    return ()=>clearInterval(iv);
  }, []);

  // Si el admin cambió el plan, el cliente solo necesita refrescar la página.
  useEffect(() => {
    const key = licenseInfo?.key;
    if (!key) return;
    validateLicense(key).then(result => {
      if (result.valid) {
        // Actualizar con los límites frescos del Worker
        const updated = { key, ...result, valid: true };
        setLicenseInfo(updated);
        try { localStorage.setItem(LICENSE_STORAGE_KEY, JSON.stringify(updated)); } catch {}
      } else if (result.error && (
        result.error.includes("revocada") ||
        result.error.includes("encontrada")
      )) {
        // Licencia revocada o eliminada → cerrar sesión
        localStorage.removeItem(LICENSE_STORAGE_KEY);
        setLicenseInfo(null);
      }
      // Si hay error de red, dejamos los datos cacheados sin cambios
    });
  }, []); // Solo al montar — el cliente refresca para ver cambios de plan

  // ── § 0c  Polling de licencia cada 5 min — detecta revocaciones automáticamente ──
  // Llamada ligera (~50ms). No afecta Supabase ni operaciones.
  useEffect(() => {
    const key = licenseInfo?.key;
    if (!key) return;
    const iv = setInterval(() => {
      validateLicense(key).then(result => {
        if (result.valid) {
          // Actualizar plan si cambió
          const updated = { key, ...result, valid: true };
          setLicenseInfo(updated);
          try { localStorage.setItem(LICENSE_STORAGE_KEY, JSON.stringify(updated)); } catch {}
        } else if (result.error && (
          result.error.includes("revocada") ||
          result.error.includes("encontrada")
        )) {
          // Revocar acceso inmediatamente sin necesidad de refrescar
          localStorage.removeItem(LICENSE_STORAGE_KEY);
          setLicenseInfo(null);
        }
        // Error de red → no hacer nada, esperar el próximo ciclo
      });
    }, 5 * 60 * 1000); // cada 5 minutos
    return () => clearInterval(iv);
  }, []); // eslint-disable-line

  // ── Simulación de variación de equity (solo cuando NO hay Supabase) ──
  useEffect(()=>{
    if (supaConfig?.url) return; // Supabase conectado → datos reales, sin simulación
    const iv = setInterval(()=>{
      setMasters(p=>p.map(m=>m.status!=="online"?m:{
        ...m,
        equity:  +(m.equity  + (Math.random()-0.5)*25).toFixed(2),
        openPnL: +(m.openPnL + (Math.random()-0.5)*18).toFixed(2),
      }));
    }, CFG.SIM_MS);
    return ()=>clearInterval(iv);
  }, [supaConfig]);

  // ── Helpers para agregar entradas al log ──
  const addLog = useCallback((entries) => {
    setLogs(p=>[...entries,...p].slice(0, CFG.MAX_LOGS));
  }, []);

  // ── Handlers: cuentas maestras ──
  const addMaster = useCallback(async m => {
    if (supaConfig?.url) {
      const h = {
        "apikey": supaConfig.key,
        "Authorization": `Bearer ${supaConfig.key}`,
        "Content-Type": "application/json",
        "Prefer": "return=minimal",
      };
      await fetch(`${supaConfig.url}/rest/v1/cuentas_maestras`, {
        method: "POST", headers: h,
        body: JSON.stringify({
          id: m.id, tag: m.tag, nombre: m.name,
          broker: m.broker, plataforma: "MT5",
          estado: "offline", balance: 0, equidad: 0,
          pnl_abierto: 0, copiadora_on: true,
        }),
      });
    }
    setMasters(p => sortById([...p, m]));
    setActiveMId(m.id);
  }, [supaConfig]);

  const toggleCopier = useCallback(async mid => {
    const current = masters.find(m => m.id === mid);
    if (!current) return;
    const newVal = !current.copierOn;
    // Proteger por 6s contra sobreescritura del poll
    protectedToggles.current.set(`m:${mid}`, { val: newVal, exp: Date.now() + 6000 });
    if (supaConfig?.url) {
      const h = {
        "apikey": supaConfig.key,
        "Authorization": `Bearer ${supaConfig.key}`,
        "Content-Type": "application/json",
        "Prefer": "return=minimal",
      };
      await fetch(`${supaConfig.url}/rest/v1/cuentas_maestras?id=eq.${mid}`, {
        method: "PATCH", headers: h,
        body: JSON.stringify({ copiadora_on: newVal }),
      });
    }
    setMasters(p=>p.map(m=>m.id===mid?{...m,copierOn:newVal}:m));
  }, [supaConfig, masters]);

  const deleteMaster = useCallback(async mid => {
    if (supaConfig?.url) {
      const h = { "apikey": supaConfig.key, "Authorization": `Bearer ${supaConfig.key}` };
      // Borrar receptoras primero (evita huérfanas en Supabase)
      await fetch(`${supaConfig.url}/rest/v1/cuentas_receptoras?maestra_id=eq.${mid}`, { method:"DELETE", headers:h });
      await fetch(`${supaConfig.url}/rest/v1/cuentas_maestras?id=eq.${mid}`,           { method:"DELETE", headers:h });
    }
    setMasters(p => {
      const filtered = sortById(p.filter(m => m.id !== mid));
      setActiveMId(filtered.length > 0 ? filtered[0].id : null);
      return filtered;
    });
  }, [supaConfig]);

  // ── Handlers: cuentas receptoras ──
  const addFollower = useCallback(async (mid, f) => {
    if (supaConfig?.url) {
      const h = {
        "apikey": supaConfig.key,
        "Authorization": `Bearer ${supaConfig.key}`,
        "Content-Type": "application/json",
        "Prefer": "return=minimal",
      };
      await fetch(`${supaConfig.url}/rest/v1/cuentas_receptoras`, {
        method: "POST", headers: h,
        body: JSON.stringify({
          id: f.id, maestra_id: mid, tag: f.tag,
          nombre: f.name, broker: f.broker, plataforma: "MT5",
          estado: "offline", balance: 0,
          capital_pct: 50, riesgo_pct: 0.5, activa: true,
        }),
      });
    }
    setMasters(p=>p.map(m=>m.id===mid?{...m,followers:sortById([...m.followers,f])}:m));
  }, [supaConfig]);

  const toggleFollower = useCallback(async fid => {
    let newVal = true;
    setMasters(p => {
      const updated = p.map(m => ({
        ...m,
        followers: m.followers.map(f => {
          if (f.id === fid) { newVal = !f.enabled; return {...f, enabled: newVal}; }
          return f;
        })
      }));
      return updated;
    });
    // Proteger por 6s contra sobreescritura del poll
    protectedToggles.current.set(`f:${fid}`, { val: newVal, exp: Date.now() + 6000 });
    // Escribir en Supabase para que el EA Follower lo lea
    if (supaConfig?.url) {
      const h = {
        "apikey": supaConfig.key,
        "Authorization": `Bearer ${supaConfig.key}`,
        "Content-Type": "application/json",
        "Prefer": "return=minimal",
      };
      await fetch(`${supaConfig.url}/rest/v1/cuentas_receptoras?id=eq.${fid}`, {
        method: "PATCH", headers: h,
        body: JSON.stringify({ activa: newVal }),
      });
    }
  }, [supaConfig]);

  const updateRisk = useCallback((fid,val)=>{
    setMasters(p=>p.map(m=>({...m,followers:m.followers.map(f=>f.id===fid?{...f,riskPct:val}:f)})));
  },[]);

  const saveFollower = useCallback(updated=>{
    setMasters(p=>p.map(m=>({...m,followers:m.followers.map(f=>f.id===updated.id?{...f,...updated}:f)})));
  },[]);

  const deleteFollower = useCallback(async fid => {
    if (supaConfig?.url) {
      const h = { "apikey": supaConfig.key, "Authorization": `Bearer ${supaConfig.key}` };
      await fetch(`${supaConfig.url}/rest/v1/cuentas_receptoras?id=eq.${fid}`, { method:"DELETE", headers:h });
    }
    setMasters(p=>p.map(m=>({...m,followers:m.followers.filter(f=>f.id!==fid)})));
  }, [supaConfig]);

  // ── Handlers: acciones de cierre masivo ──
  const doClose = (type) => {
    if (!activeMaster) return;
    const ts = nowTs();
    const newLogs = activeMaster.followers.map((f,i)=>({
      id:Date.now()+i, ts, masterId:activeMaster.id, masterName:activeMaster.name,
      follower:f.name, type:"CLOSE",
      symbol:"NAS100",
      dir: type==="all"?"—":type==="pos"?"BUY":"SELL",
      lots:"—", status:"ok",
    }));
    addLog(newLogs);
    setMasters(p=>p.map(m=>m.id===activeMId?{
      ...m,
      openPnL: type==="all"?0:m.openPnL,
      opsToday:m.opsToday+newLogs.length,
    }:m));
  };

  // ── Cargar datos reales desde Supabase ──
  // Orden estable por ID: MA-001 < MA-002 < MA-003 ...
  const sortById = (arr) => [...arr].sort((a, b) => a.id.localeCompare(b.id, undefined, { numeric:true }));

  const cargarDesdeSupabase = useCallback(async (cfg) => {
    if (!cfg?.url || !cfg?.key) return;
    const h = {
      "apikey": cfg.key,
      "Authorization": `Bearer ${cfg.key}`,
    };
    try {
      // ORDER BY created_at → siempre llegan en orden de creación
      const rM = await fetch(`${cfg.url}/rest/v1/cuentas_maestras?select=*`, { headers: h });
      if (!rM.ok) return;
      const maestras = await rM.json();
      if (!maestras || maestras.length === 0) return;

      const rR = await fetch(`${cfg.url}/rest/v1/cuentas_receptoras?select=*`, { headers: h });
      const receptoras = rR.ok ? await rR.json() : [];

      const hoy = new Date().toISOString().split("T")[0];
      const rE = await fetch(`${cfg.url}/rest/v1/ejecuciones?ejecutado_en=gte.${hoy}T00:00:00&select=maestra_id,lotes_copiados`, { headers: h });
      const ejecs = rE.ok ? await rE.json() : [];

      // Mapear a formato del dashboard
      const mapped = maestras.map(m => {
        const ejecsM    = ejecs.filter(e => e.maestra_id === m.id);
        const opsHoy    = ejecsM.length;
        const lotesHoy  = ejecsM.reduce((s, e) => s + (parseFloat(e.lotes_copiados) || 0), 0);
        // Followers también ordenados por ID
        const followers = sortById(
          receptoras
            .filter(r => r.maestra_id === m.id)
            .map(r => ({
              id:          r.id,
              tag:         r.tag || r.id.slice(-2),
              name:        r.nombre,
              accountNum:  r.numero_cuenta || r.id,
              broker:      r.broker || "—",
              platform:    r.plataforma || "MT5",
              status:      r.estado || "offline",
              balance:     parseFloat(r.balance) || 0,
              equity:      parseFloat(r.equidad) || parseFloat(r.balance) || 0,
              openPnL:     parseFloat(r.pnl_abierto) || 0,
              capitalPct:  parseFloat(r.capital_pct) || 50,
              riskPct:     parseFloat(r.riesgo_pct) || 0.5,
              delayMs:     r.delay_ms || 0,
              readOnly:    r.solo_lectura || false,
              enabled:     r.activa !== false,
              ping:        r.ping_ms || 0,
              failedCopies:r.copias_fallidas || 0,
              lastOp:      r.ultima_op ? new Date(r.ultima_op).toLocaleTimeString("es",{hour12:false}) : "—",
            }))
        );
        return {
          id:        m.id,
          tag:       m.tag || "M1",
          name:      m.nombre,
          broker:    m.broker || "—",
          platform:  m.plataforma || "MT5",
          accountNum:m.numero_cuenta || m.id,
          status:    m.estado || "offline",
          balance:   parseFloat(m.balance) || 0,
          equity:    parseFloat(m.equidad) || 0,
          openPnL:   parseFloat(m.pnl_abierto) || 0,
          copierOn:  m.copiadora_on !== false,
          readOnly:  false,
          opsToday:  opsHoy,
          lotesHoy:  +lotesHoy.toFixed(2),
          followers,
        };
      });

      // Limpiar protectedToggles expirados
      const now = Date.now();
      protectedToggles.current.forEach((v, k) => { if (v.exp < now) protectedToggles.current.delete(k); });

      // Merge: actualiza existentes, preserva toggles recientes y cuentas locales nuevas
      setMasters(prev => {
        const supaIds = new Set(mapped.map(m => m.id));
        const localOnly = prev.filter(p => !supaIds.has(p.id));

        const protected_ = protectedToggles.current;
        const mergedMapped = mapped.map(m => {
          // Respetar toggle de copiadora si fue reciente
          const copierProtected = protected_.get(`m:${m.id}`);
          const followers = m.followers.map(f => {
            const fProtected = protected_.get(`f:${f.id}`);
            return fProtected ? { ...f, enabled: fProtected.val } : f;
          });
          return {
            ...m,
            copierOn: copierProtected ? copierProtected.val : m.copierOn,
            followers,
          };
        });

        return sortById([...mergedMapped, ...localOnly]);
      });

      setActiveMId(prev => prev || mapped[0]?.id || null);
      setDemoMode(false);
    } catch(e) {
      console.error("Error cargando Supabase:", e);
    }
  }, []);

  // ── § 18b  Cargar log real de operaciones desde Supabase ──
  // Lee las últimas 100 ejecuciones y las señales asociadas.
  // Se llama cada 15s para no saturar Supabase con queries pesadas.
  const cargarLogs = useCallback(async (cfg) => {
    if (!cfg?.url || !cfg?.key) return;
    const h = { "apikey": cfg.key, "Authorization": `Bearer ${cfg.key}` };
    try {
      // Últimas 100 ejecuciones ordenadas por ID desc
      const rE = await fetch(
        `${cfg.url}/rest/v1/ejecuciones?select=*&order=id.desc&limit=100`,
        { headers: h }
      );
      if (!rE.ok) return;
      const ejecs = await rE.json();
      if (!ejecs || ejecs.length === 0) return;

      // IDs de señales únicas para buscar símbolo, tipo y dirección
      const senalIds = [...new Set(ejecs.map(e => e.senal_id).filter(Boolean))];
      let senalesMap = {};
      if (senalIds.length > 0) {
        const idsQuery = `(${senalIds.join(",")})`;
        const rS = await fetch(
          `${cfg.url}/rest/v1/senales?id=in.${idsQuery}&select=id,tipo,simbolo,direccion,lotes`,
          { headers: h }
        );
        if (rS.ok) {
          const senales = await rS.json();
          senales.forEach(s => { senalesMap[s.id] = s; });
        }
      }

      // Nombres de receptoras para mostrar en el log
      const rR = await fetch(
        `${cfg.url}/rest/v1/cuentas_receptoras?select=id,nombre`,
        { headers: h }
      );
      let receptorasMap = {};
      if (rR.ok) {
        const recs = await rR.json();
        recs.forEach(r => { receptorasMap[r.id] = r.nombre || r.id; });
      }

      // Nombres de maestras
      const rM = await fetch(
        `${cfg.url}/rest/v1/cuentas_maestras?select=id,nombre`,
        { headers: h }
      );
      let maestrasMap = {};
      if (rM.ok) {
        const maes = await rM.json();
        maes.forEach(m => { maestrasMap[m.id] = m.nombre || m.id; });
      }

      // Mapear ejecuciones → formato log del dashboard
      const mapped = ejecs.map(e => {
        const senal = senalesMap[e.senal_id] || {};
        const ts = e.ejecutado_en
          ? new Date(e.ejecutado_en).toLocaleTimeString("es", { hour12: false })
          : "—";
        return {
          id:         e.id,
          ts,
          masterId:   e.maestra_id    || "—",
          masterName: maestrasMap[e.maestra_id] || e.maestra_id || "—",
          follower:   receptorasMap[e.receptora_id] || e.receptora_id || "—",
          type:       senal.tipo      || "COPY",
          symbol:     senal.simbolo   || "—",
          dir:        senal.direccion || "—",
          lotsM: senal.lotes ? String(parseFloat(senal.lotes).toFixed(2)) : "—",
          lots:  e.lotes_copiados ? String(parseFloat(e.lotes_copiados).toFixed(2)) : "—",
          status:     e.estado === "ok" || e.estado === "ejecutada" ? "ok" : "fail",
        };
      });

      setLogs(mapped);
    } catch(e) {
      console.error("Error cargando logs:", e);
    }
  }, []);

  // ── Polling automático cuando Supabase está conectado ──
  // Maestras/receptoras: cada 5s | Logs: cada 15s
  useEffect(() => {
    if (!supaConfig?.url) return;
    cargarDesdeSupabase(supaConfig);
    cargarLogs(supaConfig);
    const ivData = setInterval(() => cargarDesdeSupabase(supaConfig), 5000);
    const ivLogs = setInterval(() => cargarLogs(supaConfig), 15000);
    return () => { clearInterval(ivData); clearInterval(ivLogs); };
  }, [supaConfig, cargarDesdeSupabase, cargarLogs]);

  // ── Guardar config Supabase en estado y localStorage ──
  const handleSupaSave = useCallback(cfg=>{
    setSupaConfig(cfg);
    setDemoMode(!cfg.url);
    try { localStorage.setItem("ct_supa", JSON.stringify(cfg)); } catch{}
    cargarDesdeSupabase(cfg);
    cargarLogs(cfg);
  },[cargarDesdeSupabase, cargarLogs]);

  // ── § 19 Cerrar sesión de licencia ──
  const handleLogout = () => {
    localStorage.removeItem(LICENSE_STORAGE_KEY);
    setLicenseInfo(null);
  };

  /* ── Render ── */
  const maxMasters     = licenseInfo?.maxMasters   || 1;
  const maxFollowers   = licenseInfo?.maxFollowers || 3;
  const totalFollowers = masters.reduce((acc, m) => acc + m.followers.length, 0);
  const masterLimitReached = maxMasters < 999 && masters.length >= maxMasters;

  // ── § 0  Si no hay licencia válida → pantalla de licencia ──
  if (!licenseInfo?.valid) {
    return <LicenseGate onValidated={info => setLicenseInfo({...info, valid:true})}/>;
  }

  return (
    <div style={{
      height:"100vh", width:"100vw", background:T.bg, color:T.text,
      fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif",
      display:"flex", flexDirection:"column", overflow:"hidden",
    }}>

      {/* §17+19 Header unificado */}
      <Header
        supaConfig={supaConfig}
        demoMode={demoMode}
        masterLimitReached={masterLimitReached}
        onOpenSupabase={()=>setModal("supabase")}
        onAddMaster={()=>setModal("newMaster")}
        onOpenLogs={()=>setModal("logs")}
        onOpenEAParams={()=>setModal("eaParams")}
        licenseInfo={licenseInfo}
        masters={masters}
        onLogout={handleLogout}
      />

      {/* ── Contenido principal — compacto y sin scroll global ── */}
      <div style={{flex:1, overflow:"hidden", display:"flex", flexDirection:"column", padding:"14px 22px 0"}}>

        {/* Parte fija — con scroll interno si OpenPositions crece mucho */}
        <div style={{flexShrink:0, maxHeight:"55vh", overflowY:"auto"}}>


        {/* §16 Alertas */}
        <AlertsPanel masters={masters}/>

        {/* ── Tabs de cuentas maestras — orden de creación ── */}
        <div style={{display:"flex", gap:12, overflowX:"auto", paddingBottom:6, marginBottom:16}}>
          {masters.map(m=>(
            <MasterTab key={m.id} master={m} active={m.id===activeMId}
              onClick={()=>setActiveMId(m.id)}
              onDelete={deleteMaster}
            />
          ))}
          {/* Tab "agregar nueva" — bloqueado si se alcanzó el límite */}
          {!masterLimitReached ? (
            <div onClick={()=>{ playClick(); setModal("newMaster"); }} style={{
              minWidth:150, border:`2px dashed ${T.border}`, borderRadius:14,
              display:"flex", flexDirection:"column", alignItems:"center",
              justifyContent:"center", gap:5, cursor:"pointer",
              color:T.textMuted, fontSize:12, padding:"14px 20px",
              transition:"all 0.18s", flexShrink:0,
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=T.accent;e.currentTarget.style.color=T.accent;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.textMuted;}}>
              <span style={{fontSize:24}}>+</span>
              <span style={{fontWeight:600}}>Nueva cuenta maestra</span>
            </div>
          ) : (
            <div style={{
              minWidth:150, border:`2px dashed ${T.err}40`, borderRadius:14,
              display:"flex", flexDirection:"column", alignItems:"center",
              justifyContent:"center", gap:5,
              color:T.err, fontSize:12, padding:"14px 20px", flexShrink:0, opacity:0.6,
            }}>
              <span style={{fontSize:20}}>🔒</span>
              <span style={{fontWeight:600}}>Límite alcanzado</span>
              <span style={{fontSize:10, color:T.textMuted}}>Actualiza tu plan</span>
            </div>
          )}
        </div>

        {/* ── Panel de cuenta maestra activa ── */}
        {activeMaster && (
          <div style={{
            background:T.card, border:`1px solid ${T.border}`,
            borderRadius:16, padding:"20px 24px", marginBottom:20,
            position:"relative", overflow:"hidden",
          }}>
            {/* Línea de acento superior */}
            <div style={{
              position:"absolute", top:0, left:0, right:0, height:2,
              background:`linear-gradient(90deg,${T.accent},${T.purple},${T.ok})`,
            }}/>

            {/* Header del panel */}
            <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:18, flexWrap:"wrap", gap:12}}>
              <div style={{display:"flex", alignItems:"center", gap:12}}>
                <div style={{
                  width:44, height:44, borderRadius:12, flexShrink:0,
                  background:`linear-gradient(135deg,${T.accent},${T.purple})`,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontWeight:900, fontSize:16, color:"#fff",
                  boxShadow:`0 0 16px ${T.accentGlow}`,
                }}>{activeMaster.tag}</div>
                <div>
                  <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
                    <h2 style={{margin:0, fontSize:20, fontWeight:900, color:T.text}}>
                      {activeMaster.name}
                    </h2>
                    <Dot status={activeMaster.status}/>
                    <span style={{color:statusClr(activeMaster.status), fontSize:12, fontWeight:700}}>
                      {statusLabel(activeMaster.status)}
                    </span>
                    {activeMaster.readOnly && <Badge label="Solo lectura" color={T.warn}/>}
                  </div>
                  <div style={{color:T.textMuted, fontSize:13, marginTop:4}}>
                    {activeMaster.broker} · {activeMaster.platform} · {activeMaster.accountNum}
                  </div>
                </div>
              </div>

              {/* Acciones — solo lo que funciona */}
              <div style={{display:"flex", gap:8, alignItems:"center"}}>
                <Btn variant="ghost" onClick={()=>setModal("logs")} size="sm">📋 Operaciones</Btn>

                {/* Toggle copiadora */}
                <div style={{
                  display:"flex", alignItems:"center", gap:7,
                  background: activeMaster.copierOn ? T.okLow : T.cardLight,
                  border:`1px solid ${activeMaster.copierOn ? T.ok+"50" : T.border}`,
                  borderRadius:8, padding:"5px 11px",
                  transition:"all 0.2s",
                }}>
                  <span style={{
                    color: activeMaster.copierOn ? T.ok : T.textMuted,
                    fontSize:11, fontWeight:700,
                    textTransform:"uppercase", letterSpacing:"0.4px",
                    transition:"color 0.2s",
                  }}>
                    {activeMaster.copierOn ? "Activa" : "Pausada"}
                  </span>
                  <Toggle on={activeMaster.copierOn} onChange={()=>toggleCopier(activeMaster.id)} size="sm"/>
                </div>
              </div>
            </div>

            <Sep my={14}/>

            {/* §13 Stats */}
            <StatsBar master={activeMaster}/>


          </div>
        )}

        </div>{/* fin parte fija */}

        {/* §15 Receptoras — scroll propio */}
        <div style={{flex:1, overflowY:"auto", paddingBottom:20}}>
          {activeMaster && (
            <FollowersTable
              master={activeMaster}
              onAddFollower={mid=>{ setAddFor(mid); setModal("newFollower"); }}
              onToggle={toggleFollower}
              onRisk={updateRisk}
              onEdit={f=>{ setEditing(f); setModal("editFollower"); }}
              onDelete={deleteFollower}
              onLog={f=>{ setLogFilt(f.name); setModal("logFollower"); }}
              maxFollowers={maxFollowers}
              totalFollowers={totalFollowers}
            />
          )}
        </div>

      </div>{/* fin contenido principal */}

      {/* ================================================================
          MODALES
          Solo se renderiza uno a la vez.
          ================================================================ */}

      {/* §20 Parámetros EA */}
      {modal==="eaParams" && (
        <ModalEAParams
          licenseInfo={licenseInfo}
          supaConfig={supaConfig}
          masters={masters}
          onClose={close}
        />
      )}

      {/* §7 Nueva maestra */}
      {modal==="newMaster" && (
        <ModalNewMaster onClose={close} onAdd={addMaster} masterCount={masters.length}/>
      )}

      {/* §8 Nueva receptora */}
      {modal==="newFollower" && (
        <ModalNewFollower
          masterId={addFollowerFor}
          onClose={close}
          onAdd={addFollower}
          followerCount={masters.reduce((acc,m)=>acc+m.followers.length,0)}
        />
      )}

      {/* §9 Editar receptora */}
      {modal==="editFollower" && editingFollower && (
        <ModalEditFollower follower={editingFollower} onClose={close} onSave={saveFollower}/>
      )}

      {/* §10 Configuración Supabase */}
      {modal==="supabase" && (
        <ModalSupabase config={supaConfig} onClose={close} onSave={handleSupaSave}/>
      )}

      {/* §11 Log global */}
      {modal==="logs" && (
        <ModalLogs
          logs={logs}
          filterMasterId={activeMaster?.id}
          title={`📋 Operaciones — ${activeMaster?.name}`}
          onClose={close}
        />
      )}

      {/* §11 Log por follower */}
      {modal==="logFollower" && (
        <ModalLogs
          logs={logs}
          filterFollower={logFollowerFilter}
          title={`📋 Operaciones — ${logFollowerFilter}`}
          onClose={close}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(CopyTradeApp)
);
</script>
</body>
</html>
