/* ================================================================
   § 4  CONEXIÓN A SUPABASE
   ─────────────────────────────────────────────────────────────────
   Cliente ligero para Supabase REST API.
   Cada usuario conecta su propia cuenta gratuita.
   No modifiques esto a menos que cambies el backend.
   ================================================================ */
const makeSupaClient = (url, key) => {
  if (!url || !key) return null;
  const h = {
    "apikey": key,
    "Authorization": `Bearer ${key}`,
    "Content-Type": "application/json",
  };
  const base = `${url}/rest/v1`;
  return {
    url, key,
    get:    async (t,q="")  => { try { const r=await fetch(`${base}/${t}?${q}`,{headers:h}); return r.ok?r.json():null; } catch{return null;} },
    post:   async (t,b)     => { try { const r=await fetch(`${base}/${t}`,{method:"POST",headers:{...h,"Prefer":"return=representation"},body:JSON.stringify(b)}); return r.ok?r.json():null; } catch{return null;} },
    patch:  async (t,q,b)   => { try { const r=await fetch(`${base}/${t}?${q}`,{method:"PATCH",headers:{...h,"Prefer":"return=representation"},body:JSON.stringify(b)}); return r.ok?r.json():null; } catch{return null;} },
    delete: async (t,q)     => { try { const r=await fetch(`${base}/${t}?${q}`,{method:"DELETE",headers:h}); return r.ok; } catch{return false;} },
  };
};

/* — Botón — */
const Btn = ({ children, onClick, variant="primary", size="md", disabled=false, sx={} }) => {
  const base = {
    cursor:disabled?"not-allowed":"pointer", opacity:disabled?0.45:1,
    border:"none", borderRadius:8, fontWeight:700,

    warn:    { background:T.warnLow,   color:T.warn,   border:`1px solid ${T.warn}35` },
  };
  return (
    <button style={{...base,...variants[variant],...sx}} onClick={disabled?undefined:onClick}>
      {children}
    </button>
  );
};

/* ================================================================

      onClose();

        <Inp value={f.name} onChange={set("name")} placeholder="Ej: Cuenta FTMO Principal"/>

      <div style={{display:"flex", gap:12}}>
        <Field label="Broker" half><Sel value={f.broker} onChange={set("broker")} options={BROKERS_LIST}/></Field>
        <Field label="Plataforma" half><Sel value={f.platform} onChange={set("platform")} options={["MT5","MT4"]}/></Field>
      </div>
      <Field label="Número de cuenta MT5">
        <Inp value={f.accountNum} onChange={set("accountNum")} placeholder="#12345678"/>
      </Field>
      <Banner color={T.accent}>
        <b>📡 Conexión automática via EA:</b><br/>
        1. Instala el <b>EA Maestro</b> en tu MT5<br/>
        2. El EA detecta el balance, equity y operaciones en tiempo real<br/>
        3. Envía los datos a tu Supabase configurado en § 4<br/>

      {f.connecting && (

/* ================================================================
   § 8  MODAL — NUEVA CUENTA RECEPTORA
   ─────────────────────────────────────────────────────────────────
   Formulario para agregar una cuenta follower a una maestra.
   Al conectar, auto-detecta el balance de esa cuenta MT5.
   ================================================================ */
const ModalNewFollower = ({ masterId, onClose, onAdd }) => {
  const [f, setF] = useState({
    name:"", broker:BROKERS_LIST[0], platform:"MT5", accountNum:"",
    capitalPct:50, riskPct:0.50, delayMs:0, readOnly:false, connecting:false,
  });
  const set = k => v => setF(p=>({...p,[k]:v}));

  const handleAdd = () => {
    if (!f.name || !f.accountNum) return;
    setF(p=>({...p, connecting:true}));
    setTimeout(() => {
      const num = f.accountNum.replace(/\D/g,"").slice(-2)||"01";
      onAdd(masterId, {
        id:`F-${uid()}`, tag:`R${num}`,
        name:f.name, broker:f.broker, platform:f.platform, accountNum:f.accountNum,
        status:"connected",
        balance:  +(5000 + Math.random()*25000).toFixed(2),
        capitalPct:+f.capitalPct, riskPct:+f.riskPct, delayMs:+f.delayMs,
        readOnly:f.readOnly, enabled:true,
        ping: 15+Math.round(Math.random()*55), failedCopies:0, lastOp:"—",
      });
      onClose();
    }, 1800);
  };

  return (
    <ModalWrap onClose={onClose}>
      <ModalHd title="+ Nueva cuenta receptora" onClose={onClose}/>
      <Field label="Nombre de la cuenta">
        <Inp value={f.name} onChange={set("name")} placeholder="Ej: Cuenta FTMO Follower"/>
      </Field>
      <div style={{display:"flex", gap:12}}>
        <Field label="Broker" half><Sel value={f.broker} onChange={set("broker")} options={BROKERS_LIST}/></Field>
        <Field label="Plataforma" half><Sel value={f.platform} onChange={set("platform")} options={["MT5","MT4"]}/></Field>
      </div>
      <Field label="Número de cuenta MT5">
        <Inp value={f.accountNum} onChange={set("accountNum")} placeholder="#12345678"/>
      </Field>
      <div style={{display:"flex", gap:12}}>
        <Field label="% Asignación capital" half>
          <Inp type="number" value={f.capitalPct} onChange={set("capitalPct")} min={1} max={100} step={1} placeholder="50"/>
        </Field>
        <Field label="% Riesgo por operación" half>
          <Inp type="number" value={f.riskPct} onChange={set("riskPct")} min={0.01} max={10} step={0.01} placeholder="0.50"/>
        </Field>
      </div>
      <div style={{display:"flex", gap:12}}>
        <Field label="Delay de copia (ms)" half>
          <Inp type="number" value={f.delayMs} onChange={set("delayMs")} min={0} max={5000} step={100} placeholder="0"/>
        </Field>
        <Field label="Modo solo lectura" half>
          <div style={{display:"flex",alignItems:"center",gap:10,height:38,paddingLeft:4}}>
            <Toggle on={f.readOnly} onChange={v=>set("readOnly")(v)} size="sm"/>
            <span style={{color:T.textSec, fontSize:12}}>{f.readOnly?"Activo — no ejecuta":"Desactivado"}</span>
          </div>
        </Field>
      </div>
      <Banner color={T.ok}>
        Al conectar, el balance se detectará automáticamente desde MT5 via EA Follower.<br/>
        El lote copiado = lote_master × (balance × {f.capitalPct}% / balance_master)
      </Banner>
      {f.connecting && (
        <div style={{textAlign:"center", padding:"10px 0", color:T.ok, fontWeight:700}}>
          ⟳ Detectando cuenta y balance...
        </div>
      )}
      <div style={{display:"flex", gap:10, justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn variant="primary" onClick={handleAdd} disabled={!f.name||!f.accountNum||f.connecting}>
          {f.connecting ? "Conectando..." : "Agregar cuenta"}
        </Btn>
      </div>
    </ModalWrap>
  );
};

};

/* ================================================================
   § 10  MODAL — CONFIGURACIÓN SUPABASE
   ─────────────────────────────────────────────────────────────────
   Cada usuario conecta su propio proyecto Supabase gratuito.
   Costo: $0 para ti y $0 para el usuario.
   ================================================================ */
const ModalSupabase = ({ config, onClose, onSave }) => {
  const [url, setUrl] = useState(config?.url||"");
  const [key, setKey] = useState(config?.key||"");
  const [testing, setTesting] = useState(false);
  const [result, setResult] = useState(null);

  const testConn = async () => {
    setTesting(true); setResult(null);
    try {
      const r = await fetch(`${url}/rest/v1/`, { headers:{"apikey":key,"Authorization":`Bearer ${key}`} });
      setResult(r.ok ? "ok" : "fail");
    } catch { setResult("fail"); }
    setTesting(false);
  };

  return (
    <ModalWrap onClose={onClose}>
      <ModalHd title="⚙️  Configuración Supabase" onClose={onClose}/>
      <Banner color={T.accent}>
        <b>Modelo de infraestructura:</b> Cada usuario usa su propia cuenta de Supabase gratuita.
        Tu costo mensual = <b>$0</b>. El usuario no paga nada adicional.
      </Banner>
      <Field label="URL del proyecto Supabase">
        <Inp value={url} onChange={setUrl} placeholder="https://xxxxxxxxxxxx.supabase.co"/>
      </Field>
      <Field label="Clave anon (pública)">
        <Inp value={key} onChange={setKey} placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."/>
      </Field>
      <div style={{fontSize:12, color:T.textMuted, marginBottom:14, lineHeight:1.7}}>
        Encuéntralas en: <b style={{color:T.accent}}>Supabase → Project Settings → API</b>
      </div>
      {result==="ok"   && <Banner color={T.ok}><b>✓ Conexión exitosa.</b> El dashboard está listo para usar con tu Supabase.</Banner>}
      {result==="fail" && <Banner color={T.err}><b>✗ Error de conexión.</b> Verifica la URL y la clave anon.</Banner>}
      <div style={{display:"flex", gap:10, justifyContent:"flex-end"}}>
        <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
        <Btn variant="dark" onClick={testConn} disabled={!url||!key||testing}>
          {testing ? "⟳ Probando..." : "Probar conexión"}
        </Btn>
        <Btn variant="primary" onClick={()=>{onSave({url,key});onClose();}} disabled={!url||!key}>
          Guardar y conectar
        </Btn>
      </div>
    </ModalWrap>
  );
};

/* ================================================================
   § 11  MODAL — LOG DE OPERACIONES
   ─────────────────────────────────────────────────────────────────
   Historial completo de copias, cierres y errores.
   Se puede filtrar por maestra o ver todo el historial.
   ================================================================ */
const ModalLogs = ({ logs, filterMasterId, filterFollower, title, onClose }) => {
  const [search, setSearch] = useState("");
  let filtered = logs;
  if (filterMasterId) filtered = filtered.filter(l=>l.masterId===filterMasterId);
  if (filterFollower) filtered = filtered.filter(l=>l.follower===filterFollower);
  if (search) {
    const s = search.toLowerCase();
    filtered = filtered.filter(l=>
      l.symbol?.toLowerCase().includes(s) ||
      l.follower?.toLowerCase().includes(s) ||
      l.masterName?.toLowerCase().includes(s) ||
      l.type?.toLowerCase().includes(s) ||
      l.dir?.toLowerCase().includes(s) ||
      l.status?.toLowerCase().includes(s)
    );
  }
  return (
    <ModalWrap onClose={onClose} maxW={680}>
      <ModalHd title={title||"📋 Log de operaciones"} onClose={onClose}/>
      <Inp value={search} onChange={setSearch} placeholder="Buscar por símbolo, follower, tipo..."/>
      <div style={{marginTop:12, overflowY:"auto", maxHeight:420}}>
        {/* Encabezado tabla */}
        <div style={{
          display:"grid", gridTemplateColumns:"55px 70px 70px 55px 1fr 55px 55px 60px",
          gap:8, padding:"7px 10px",
          background:T.cardLight, borderRadius:"8px 8px 0 0",
          fontSize:10, fontWeight:800, color:T.textMuted, letterSpacing:"0.5px", textTransform:"uppercase",
        }}>
          {["Hora","Maestra","Tipo","Dir","Follower","Símbolo","Lotes","Estado"].map(h=>(
            <span key={h}>{h}</span>
          ))}
        </div>
        {filtered.length===0 ? (
          <div style={{textAlign:"center", padding:"30px 0", color:T.textMuted, fontSize:13}}>
            Sin operaciones registradas
          </div>
        ) : filtered.map(l=>(
          <div key={l.id} style={{
            display:"grid", gridTemplateColumns:"55px 70px 70px 55px 1fr 55px 55px 60px",
            gap:8, padding:"8px 10px",
            borderBottom:`1px solid ${T.border}`,
            background: l.status==="fail" ? T.errLow : "transparent",
            fontSize:12, alignItems:"center",
          }}>
            <span style={{color:T.textMuted, fontFamily:"monospace"}}>{l.ts}</span>
            <span style={{color:T.textSec, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}} title={l.masterName}>
              {l.masterName?.split(" ").slice(-1)[0]}
            </span>
            <Badge label={l.type} color={l.type==="COPY"?T.accent:l.type==="CLOSE"?T.warn:T.purple}/>
            <Badge label={l.dir||"—"} color={l.dir==="BUY"?T.ok:l.dir==="SELL"?T.err:T.textMuted}/>
            <span style={{color:T.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{l.follower}</span>
            <span style={{color:T.text, fontWeight:700}}>{l.symbol}</span>
            <span style={{color:T.textSec, fontFamily:"monospace"}}>{l.lots}</span>
            <Badge label={l.status==="ok"?"✓ OK":"✗ FAIL"} color={l.status==="ok"?T.ok:T.err}/>
          </div>
        ))}
      </div>
      <div style={{marginTop:12, fontSize:12, color:T.textMuted, textAlign:"right"}}>
        {filtered.length} entrada(s) mostrada(s)
      </div>
    </ModalWrap>
  );
};

    if (!menuOpen) return;
    const handler = e => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [menuOpen]);

  const COLS = "2.2fr 1fr 1.5fr 1.3fr 1.4fr 100px";
  return (
    <div style={{
      display:"grid", gridTemplateColumns:COLS, gap:12,
      padding:"14px 18px", borderBottom:`1px solid ${T.border}`,

          <div style={{display:"flex", gap:4, marginTop:3, flexWrap:"wrap"}}>

            borderRadius:2, transition:"width 0.3s",

        <div style={{color:T.textMuted, fontSize:10, marginTop:3}}>

    </div>
  );
};

/* ================================================================
   § 16  COMPONENTE — PANEL DE ALERTAS
   ─────────────────────────────────────────────────────────────────
   Aparece solo cuando hay copias fallidas o cuentas desconectadas.
   Modifica solo aquí para cambiar el comportamiento de alertas.
   ================================================================ */
const AlertsPanel = ({ masters }) => {
  const alerts = [];
  masters.forEach(m=>{
    m.followers.filter(f=>f.failedCopies>0).forEach(f=>{
      alerts.push({ type:"failed", masterName:m.name, followerName:f.name, count:f.failedCopies });
    });
    m.followers.filter(f=>f.status!=="connected" && f.enabled).forEach(f=>{
      alerts.push({ type:"offline", masterName:m.name, followerName:f.name });
    });
    if (m.status!=="online" && m.copierOn) {
      alerts.push({ type:"master_offline", masterName:m.name });
    }
  });
  if (alerts.length===0) return null;
  return (
    <div style={{
      background:T.errLow, border:`1px solid ${T.err}40`,
      borderRadius:12, padding:"12px 16px", marginBottom:18,
    }}>
      <div style={{color:T.err, fontWeight:800, fontSize:13, marginBottom:8}}>
        ⚠ {alerts.length} alerta(s) activa(s)
      </div>
      {alerts.map((a,i)=>(
        <div key={i} style={{color:T.err, fontSize:12, marginBottom:3, display:"flex", alignItems:"center", gap:6}}>
          <span>•</span>
          {a.type==="failed"        && <span><b>{a.followerName}</b> — {a.count} copia(s) fallida(s) en <b>{a.masterName}</b></span>}
          {a.type==="offline"       && <span><b>{a.followerName}</b> desconectada (maestra: <b>{a.masterName}</b>)</span>}
          {a.type==="master_offline"&& <span>Cuenta maestra <b>{a.masterName}</b> offline con copiadora activa</span>}
        </div>
      ))}
    </div>
  );
};

      <div style={{color:T.textMuted, fontSize:11, marginTop:6, paddingLeft:48}}>
        Gestiona tus cuentas maestras y las cuentas que copian sus operaciones.
      </div>
    </div>
    <div style={{display:"flex", gap:8, alignItems:"center", flexWrap:"wrap"}}>
      {demoMode && (
        <div style={{
          background:T.warnLow, border:`1px solid ${T.warn}40`,
          borderRadius:8, padding:"4px 10px", fontSize:11, color:T.warn, fontWeight:700,
        }}>
          🟡 Modo Demo
        </div>
      )}
      <Btn variant="ghost" onClick={onOpenLogs} size="sm">📋 Log global</Btn>
      <Btn variant="ghost" onClick={onOpenSupabase} size="sm">
        {supaConfig?.url ? "🟢 Supabase" : "⚙️ Configurar Supabase"}
      </Btn>
      <Btn variant="primary" onClick={onAddMaster}>
        + Nueva cuenta maestra
      </Btn>
    </div>
  </div>
);

/* ================================================================
   § 18  APP PRINCIPAL
   ─────────────────────────────────────────────────────────────────
   Estado global, handlers y composición de todos los componentes.
   Modifica aquí solo la lógica de alto nivel y el ensamblado.
   ================================================================ */
function CopyTradeApp() {
  // ── Estado global ──
  const [masters, setMasters]       = useState(DEMO_MASTERS);
  const [activeMId, setActiveMId]   = useState(DEMO_MASTERS[0].id);
  const [logs, setLogs]             = useState(DEMO_LOGS);
  const [supaConfig, setSupaConfig] = useState({ url:"", key:"" });
  const [demoMode, setDemoMode]     = useState(true);

  // ── Estado de modales ──
  const [modal, setModal]               = useState(null);
  const [editingFollower, setEditing]   = useState(null);
  const [logFollowerFilter, setLogFilt] = useState(null);
  const [addFollowerFor, setAddFor]     = useState(null);

  const close  = () => { setModal(null); setEditing(null); setLogFilt(null); setAddFor(null); };
  const activeMaster = masters.find(m=>m.id===activeMId) || masters[0];

  // ── Simulación de ping en tiempo real ──
  useEffect(()=>{
    const iv = setInterval(()=>{
      setMasters(p=>p.map(m=>({
        ...m,
        followers:m.followers.map(f=>({
          ...f,
          ping:Math.max(8, f.ping + Math.round((Math.random()-0.5)*10)),
        })),
      })));
    }, CFG.PING_MS);
    return ()=>clearInterval(iv);
  }, []);

  // ── Simulación de variación de equity (mercado abierto) ──
  useEffect(()=>{
    const iv = setInterval(()=>{
      setMasters(p=>p.map(m=>m.status!=="online"?m:{
        ...m,
        equity:  +(m.equity  + (Math.random()-0.5)*25).toFixed(2),
        openPnL: +(m.openPnL + (Math.random()-0.5)*18).toFixed(2),
      }));
    }, CFG.SIM_MS);
    return ()=>clearInterval(iv);
  }, []);

  // ── Helpers para agregar entradas al log ──
  const addLog = useCallback((entries) => {
    setLogs(p=>[...entries,...p].slice(0, CFG.MAX_LOGS));
  }, []);

  // ── Handlers: cuentas maestras ──
  const addMaster = useCallback(m=>{
    setMasters(p=>[...p,m]);
    setActiveMId(m.id);
  },[]);

  const toggleCopier = useCallback(mid=>{
    setMasters(p=>p.map(m=>m.id===mid?{...m,copierOn:!m.copierOn}:m));
  },[]);

  // ── Handlers: cuentas receptoras ──
  const addFollower = useCallback((mid,f)=>{
    setMasters(p=>p.map(m=>m.id===mid?{...m,followers:[...m.followers,f]}:m));
  },[]);

  const toggleFollower = useCallback(fid=>{
    setMasters(p=>p.map(m=>({...m,followers:m.followers.map(f=>f.id===fid?{...f,enabled:!f.enabled}:f)})));
  },[]);

  const updateRisk = useCallback((fid,val)=>{
    setMasters(p=>p.map(m=>({...m,followers:m.followers.map(f=>f.id===fid?{...f,riskPct:val}:f)})));
  },[]);

  const saveFollower = useCallback(updated=>{
    setMasters(p=>p.map(m=>({...m,followers:m.followers.map(f=>f.id===updated.id?{...f,...updated}:f)})));
  },[]);

  const deleteFollower = useCallback(fid=>{
    setMasters(p=>p.map(m=>({...m,followers:m.followers.filter(f=>f.id!==fid)})));
  },[]);

  // ── Handlers: acciones de cierre masivo ──
  const doClose = (type) => {
    if (!activeMaster) return;
    const ts = nowTs();
    const newLogs = activeMaster.followers.map((f,i)=>({
      id:Date.now()+i, ts, masterId:activeMaster.id, masterName:activeMaster.name,
      follower:f.name, type:"CLOSE",
      symbol:"NAS100",
      dir: type==="all"?"—":type==="pos"?"BUY":"SELL",
      lots:"—", status:"ok",
    }));
    addLog(newLogs);
    setMasters(p=>p.map(m=>m.id===activeMId?{
      ...m,
      openPnL: type==="all"?0:m.openPnL,
      opsToday:m.opsToday+newLogs.length,
    }:m));
  };

  // ── Cargar datos reales desde Supabase ──
  const cargarDesdeSupabase = useCallback(async (cfg) => {
    if (!cfg?.url || !cfg?.key) return;
    const h = {
      "apikey": cfg.key,
      "Authorization": `Bearer ${cfg.key}`,
    };
    try {
      // Cargar cuentas maestras
      const rM = await fetch(`${cfg.url}/rest/v1/cuentas_maestras?select=*`, { headers: h });
      if (!rM.ok) return;
      const maestras = await rM.json();
      if (!maestras || maestras.length === 0) return;

      // Cargar cuentas receptoras
      const rR = await fetch(`${cfg.url}/rest/v1/cuentas_receptoras?select=*`, { headers: h });
      const receptoras = rR.ok ? await rR.json() : [];

      // Cargar ejecuciones de hoy para contar ops
      const hoy = new Date().toISOString().split("T")[0];
      const rE = await fetch(`${cfg.url}/rest/v1/ejecuciones?ejecutado_en=gte.${hoy}T00:00:00&select=maestra_id`, { headers: h });
      const ejecs = rE.ok ? await rE.json() : [];

      // Mapear a formato del dashboard
      const mapped = maestras.map(m => {
        const opsHoy = ejecs.filter(e => e.maestra_id === m.id).length;
        const followers = receptoras
          .filter(r => r.maestra_id === m.id)
          .map(r => ({
            id:          r.id,
            tag:         r.tag || r.id.slice(-2),
            name:        r.nombre,
            accountNum:  r.numero_cuenta || r.id,
            broker:      r.broker || "—",
            platform:    r.plataforma || "MT5",
            status:      r.estado || "offline",
            balance:     parseFloat(r.balance) || 0,
            capitalPct:  parseFloat(r.capital_pct) || 50,
            riskPct:     parseFloat(r.riesgo_pct) || 0.5,
            delayMs:     r.delay_ms || 0,
            readOnly:    r.solo_lectura || false,
            enabled:     r.activa !== false,
            ping:        r.ping_ms || 0,
            failedCopies:r.copias_fallidas || 0,
            lastOp:      r.ultima_op ? new Date(r.ultima_op).toLocaleTimeString("es",{hour12:false}) : "—",
          }));
        return {
          id:        m.id,
          tag:       m.tag || "M1",
          name:      m.nombre,
          broker:    m.broker || "—",
          platform:  m.plataforma || "MT5",
          accountNum:m.numero_cuenta || m.id,
          status:    m.estado || "offline",
          balance:   parseFloat(m.balance) || 0,
          equity:    parseFloat(m.equidad) || 0,
          openPnL:   parseFloat(m.pnl_abierto) || 0,
          copierOn:  m.copiadora_on !== false,
          readOnly:  false,
          opsToday:  opsHoy,
          followers,
        };
      });

      setMasters(mapped);
      if (mapped.length > 0) setActiveMId(mapped[0].id);
      setDemoMode(false);
    } catch(e) {
      console.error("Error cargando Supabase:", e);
    }
  }, []);

  // ── Polling automático cada 5 segundos cuando Supabase está conectado ──
  useEffect(() => {
    if (!supaConfig?.url) return;
    cargarDesdeSupabase(supaConfig);
    const iv = setInterval(() => cargarDesdeSupabase(supaConfig), 5000);
    return () => clearInterval(iv);
  }, [supaConfig, cargarDesdeSupabase]);

  // ── Guardar config Supabase ──
  const handleSupaSave = useCallback(cfg=>{
    setSupaConfig(cfg);
    setDemoMode(!cfg.url);
    cargarDesdeSupabase(cfg);
  },[cargarDesdeSupabase]);

  /* ── Render ── */
  return (
    <div style={{minHeight:"100vh", background:T.bg, color:T.text, fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif"}}>

      {/* §17 Header */}
      <Header
        supaConfig={supaConfig}
        demoMode={demoMode}
        onOpenSupabase={()=>setModal("supabase")}
        onAddMaster={()=>setModal("newMaster")}
        onOpenLogs={()=>setModal("logs")}
      />

      {/* ── Contenido principal ── */}
      <div style={{padding:"24px 28px", maxWidth:1400, margin:"0 auto"}}>

        {/* §16 Alertas */}
        <AlertsPanel masters={masters}/>

        {/* ── Tabs de cuentas maestras ── */}
        <div style={{display:"flex", gap:12, overflowX:"auto", paddingBottom:6, marginBottom:20}}>
          {masters.map(m=>(
            <MasterTab key={m.id} master={m} active={m.id===activeMId} onClick={()=>setActiveMId(m.id)}/>
          ))}
          {/* Tab "agregar nueva" */}
          <div onClick={()=>setModal("newMaster")} style={{
            minWidth:150, border:`2px dashed ${T.border}`, borderRadius:14,
            display:"flex", flexDirection:"column", alignItems:"center",
            justifyContent:"center", gap:5, cursor:"pointer",
            color:T.textMuted, fontSize:12, padding:"14px 20px",
            transition:"all 0.18s", flexShrink:0,
          }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=T.accent;e.currentTarget.style.color=T.accent;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.textMuted;}}>
            <span style={{fontSize:24}}>+</span>
            <span style={{fontWeight:600}}>Nueva cuenta maestra</span>
          </div>
        </div>

        {/* ── Panel de cuenta maestra activa ── */}
        {activeMaster && (
          <div style={{
            background:T.card, border:`1px solid ${T.border}`,
            borderRadius:16, padding:"20px 24px", marginBottom:20,
            position:"relative", overflow:"hidden",
          }}>
            {/* Línea de acento superior */}
            <div style={{
              position:"absolute", top:0, left:0, right:0, height:2,
              background:`linear-gradient(90deg,${T.accent},${T.purple},${T.ok})`,
            }}/>

            {/* Header del panel */}
            <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:18, flexWrap:"wrap", gap:12}}>
              <div style={{display:"flex", alignItems:"center", gap:12}}>
                <div style={{
                  width:44, height:44, borderRadius:12, flexShrink:0,
                  background:`linear-gradient(135deg,${T.accent},${T.purple})`,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontWeight:900, fontSize:16, color:"#fff",
                  boxShadow:`0 0 16px ${T.accentGlow}`,
                }}>{activeMaster.tag}</div>
                <div>
                  <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
                    <h2 style={{margin:0, fontSize:18, fontWeight:900, color:T.text}}>
                      {activeMaster.name}
                    </h2>
                    <Dot status={activeMaster.status}/>
                    <span style={{color:statusClr(activeMaster.status), fontSize:12, fontWeight:700}}>
                      {statusLabel(activeMaster.status)}
                    </span>
                    {activeMaster.readOnly && <Badge label="Solo lectura" color={T.warn}/>}
                  </div>
                  <div style={{color:T.textMuted, fontSize:12, marginTop:3}}>
                    {activeMaster.broker} · {activeMaster.platform} · {activeMaster.accountNum}
                  </div>
                </div>
              </div>

              {/* Botones de acción */}
              <div style={{display:"flex", gap:7, flexWrap:"wrap", alignItems:"center"}}>
                <Btn variant="dark"    onClick={()=>doClose("all")} size="sm">🕐 Cerrar todas</Btn>
                <Btn variant="success" onClick={()=>doClose("pos")} size="sm">✅ Cerrar positivas</Btn>
                <Btn variant="danger"  onClick={()=>doClose("neg")} size="sm">❌ Cerrar negativas</Btn>
                <Btn variant="ghost"   onClick={()=>setModal("logs")} size="sm">📋 Log</Btn>
                {/* Toggle copiadora */}
                <div style={{
                  display:"flex", alignItems:"center", gap:8,
                  background:T.cardLight, border:`1px solid ${T.border}`,
                  borderRadius:8, padding:"5px 12px",
                }}>
                  <span style={{color:T.textSec, fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.4px"}}>
                    Copiadora
                  </span>
                  <Toggle on={activeMaster.copierOn} onChange={()=>toggleCopier(activeMaster.id)} size="sm"/>
                </div>
              </div>
            </div>

            <Sep my={14}/>

            {/* §13 Stats */}
            <StatsBar master={activeMaster}/>
          </div>
        )}

        {/* §15 Tabla de followers */}
        {activeMaster && (
          <FollowersTable
            master={activeMaster}
            onAddFollower={mid=>{ setAddFor(mid); setModal("newFollower"); }}
            onToggle={toggleFollower}
            onRisk={updateRisk}
            onEdit={f=>{ setEditing(f); setModal("editFollower"); }}
            onDelete={deleteFollower}
            onLog={f=>{ setLogFilt(f.name); setModal("logFollower"); }}
          />
        )}
      </div>

      {/* ================================================================
          MODALES
          Solo se renderiza uno a la vez.
          ================================================================ */}

      {/* §7 Nueva maestra */}
      {modal==="newMaster" && (
        <ModalNewMaster onClose={close} onAdd={addMaster}/>
      )}

      {/* §8 Nueva receptora */}
      {modal==="newFollower" && (
        <ModalNewFollower masterId={addFollowerFor} onClose={close} onAdd={addFollower}/>
      )}

      {/* §9 Editar receptora */}
      {modal==="editFollower" && editingFollower && (
        <ModalEditFollower follower={editingFollower} onClose={close} onSave={saveFollower}/>
      )}

      {/* §10 Configuración Supabase */}
      {modal==="supabase" && (
        <ModalSupabase config={supaConfig} onClose={close} onSave={handleSupaSave}/>
      )}

      {/* §11 Log global */}
      {modal==="logs" && (
        <ModalLogs
          logs={logs}
          filterMasterId={activeMaster?.id}
          title={`📋 Log — ${activeMaster?.name}`}
          onClose={close}
        />
      )}

      {/* §11 Log por follower */}
      {modal==="logFollower" && (
        <ModalLogs
          logs={logs}
          filterFollower={logFollowerFilter}
          title={`📋 Log — ${logFollowerFilter}`}
          onClose={close}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(CopyTradeApp)
);
</script>
</body>
</html>
